<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WCL Parse Improver</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9876;</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <header>
      <h1>WCL Parse Improver</h1>
      <nav id="nav"></nav>
    </header>

    <section id="view-character" hidden>
      <div id="char-bar"></div>
      <div id="status"></div>
      <section id="overview"></section>
      <section id="raid"></section>
      <section id="report"></section>
    </section>

    <section id="view-add" hidden>
      <div class="card">
        <h2>Add character</h2>
        <p><small>The class is detected from Warcraft Logs; pick which of its specs to analyse.
          Only DPS specs can be analysed &mdash; the whole report is damage-based.</small></p>
        <form id="detect-form">
          <input id="a-name" placeholder="Character" required />
          <input id="a-server" placeholder="Server slug (e.g. grim-batol)" required />
          <input id="a-region" placeholder="Region" value="EU" size="4" required />
          <input id="a-zone" placeholder="Zone ID" value="47" size="6" required />
          <button type="submit">Detect class</button>
        </form>
        <div id="detect-status"></div>
        <div id="detect-result"></div>
      </div>
    </section>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
