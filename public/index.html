<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>WCL Parse Improver</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>&#9876;</text></svg>" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main id="app">
    <header id="topbar">
      <h1><span class="brand-mark">⚔</span> WCL Parse Improver</h1>
      <nav id="nav" hidden>
        <button type="button" class="nav-link" data-view="characters">Characters</button>
        <button type="button" class="nav-link" data-view="mplus">M+ Parses</button>
        <button type="button" class="nav-link" data-view="raid">Raid Parses</button>
      </nav>
      <!-- who is signed in -->
      <div id="user-bar"></div>
    </header>

    <!-- shown until there is a session; nothing else mounts before then -->
    <div id="signin"></div>

    <!-- who we're analysing; shown on the two analysis views -->
    <div id="char-bar"></div>
    <!-- a loading banner that always shows at the top, whatever is being fetched -->
    <div id="loading" hidden></div>
    <div id="status"></div>

    <section id="view-characters" hidden>
      <div id="char-list"></div>
    </section>

    <section id="view-mplus" hidden>
      <section id="overview"></section>
      <section id="report"></section>
    </section>

    <section id="view-raid" hidden>
      <section id="raid"></section>
    </section>
  </main>
  <script type="module" src="app.js"></script>
</body>
</html>
